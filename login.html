<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - MBTI人格测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center space-x-2">
                <div class="w-12 h-12 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center">
                    <span class="text-white font-bold text-xl">M</span>
                </div>
                <span class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">MBTI测试</span>
            </a>
        </div>

        <!-- 登录/注册卡片 -->
        <div class="bg-white/80 backdrop-blur-md rounded-3xl shadow-2xl p-8">
            <!-- 标签切换 -->
            <div class="flex mb-8 bg-gray-100 rounded-2xl p-1">
                <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-3 px-4 rounded-xl font-semibold transition-all duration-300 bg-white text-indigo-600 shadow-sm">
                    登录
                </button>
                <button id="registerTab" onclick="switchTab('register')" class="flex-1 py-3 px-4 rounded-xl font-semibold transition-all duration-300 text-gray-500 hover:text-gray-700">
                    注册
                </button>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input type="text" id="loginUsername" required 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input type="password" id="loginPassword" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="请输入密码">
                </div>
                <button type="submit" 
                    class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300">
                    登录
                </button>
            </form>

            <!-- 注册表单 -->
            <form id="registerForm" class="space-y-6 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <input type="text" id="regUsername" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="请设置用户名">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">邮箱（可选）</label>
                    <input type="email" id="regEmail"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="请输入邮箱">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <input type="password" id="regPassword" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="请设置密码（至少6位）">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">确认密码</label>
                    <input type="password" id="regConfirmPassword" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all outline-none"
                        placeholder="请再次输入密码">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300">
                    注册账号
                </button>
            </form>

            <!-- 提示消息 -->
            <div id="message" class="mt-6 text-center text-sm hidden"></div>

            <!-- 返回首页 -->
            <div class="mt-6 text-center">
                <a href="index.html" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                    ← 返回首页
                </a>
            </div>
        </div>

        <!-- 提示 -->
        <p class="text-center text-gray-500 text-sm mt-6">
            注册即表示同意保存测试记录到本地
        </p>
    </div>

    <script src="js/app.js"></script>
    <script>
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (tab === 'login') {
                loginTab.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all duration-300 bg-white text-indigo-600 shadow-sm';
                registerTab.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all duration-300 text-gray-500 hover:text-gray-700';
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all duration-300 bg-white text-indigo-600 shadow-sm';
                loginTab.className = 'flex-1 py-3 px-4 rounded-xl font-semibold transition-all duration-300 text-gray-500 hover:text-gray-700';
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
            hideMessage();
        }

        function showMessage(text, isError = false) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `mt-6 text-center text-sm p-3 rounded-xl ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            msg.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        // 登录提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const result = loginUser(username, password);
            if (result.success) {
                showMessage('登录成功！正在跳转...', false);
                setTimeout(() => {
                    window.location.href = 'test.html';
                }, 1000);
            } else {
                showMessage(result.message, true);
            }
        });

        // 注册提交
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (password.length < 6) {
                showMessage('密码至少需要6位', true);
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', true);
                return;
            }
            
            const result = registerUser(username, email, password);
            if (result.success) {
                showMessage('注册成功！正在跳转...', false);
                setTimeout(() => {
                    window.location.href = 'test.html';
                }, 1000);
            } else {
                showMessage(result.message, true);
            }
        });
    </script>
</body>
</html>
